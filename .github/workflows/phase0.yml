name: Phase 0

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    name: TypeScript client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci --prefix extension
      - run: npm --prefix extension run check
      - run: npm --prefix extension test
      - run: npm audit --prefix extension --omit=dev

  pascal:
    name: Pascal (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install FPC on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fp-compiler fp-units-fcl
      - name: Install FPC on macOS
        if: runner.os == 'macOS'
        run: brew install fpc
      - name: Install FPC on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install freepascal --version=3.2.2 -y --no-progress
          $compiler = Get-ChildItem C:\FPC\3.2.2\bin -Filter fpc.exe -Recurse |
            Select-Object -First 1
          if (-not $compiler) { throw 'FPC executable was not installed' }
          $compiler.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Confirm compiler version
        shell: bash
        run: test "$(fpc -iV)" = "3.2.2"
      - name: Build and test
        run: python tools/pascal_checks.py
